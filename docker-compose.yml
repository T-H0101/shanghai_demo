# ============================================================
# Docker PostgreSQL 17 - 统一平台中心库
# Sprint 2B.1 - 本地开发环境
# ============================================================
#
# 用途：
#   - 本地开发验证 PostgreSQL 连接
#   - 中心库 Schema 初始化
#   - 不连接真实源库，不同步真实数据
#
# 使用方法：
#   docker compose up -d postgres
#   docker compose logs postgres
#   docker compose down -v  # 停止并删除数据卷
#
# 密码：
#   - 默认 dev (Sprint 2B.1)
#   - 生产/真实环境必须 POSTGRES_PASSWORD env 注入 (强密码)
#   - 轮换流程见 docs/secrets/SECRETS.md (gitignored)
# ============================================================
name: unified-disc-platform

services:
  postgres:
    image: postgres:17
    container_name: unified_disc_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: unified
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-unified123}
      POSTGRES_DB: unified_disc_platform
      POSTGRES_INITDB_ARGS: "-E UTF8"
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U unified -d unified_disc_platform"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - unified_disc_network

  opensearch:
    image: opensearchproject/opensearch:2
    container_name: unified_disc_opensearch
    restart: unless-stopped
    environment:
      - discovery.type=single-node
      - plugins.security.disabled=true
      - OPENSEARCH_INITIAL_ADMIN_PASSWORD=local-dev-only
      - DISABLE_INSTALL_DEMO_CONFIG=true
    ulimits:
      memlock:
        soft: -1
        hard: -1
    ports:
      - "9200:9200"
    networks:
      - unified_disc_network

  clickhouse:
    image: clickhouse/clickhouse-server:24
    container_name: unified_disc_clickhouse
    restart: unless-stopped
    environment:
      - CLICKHOUSE_DB=unified_logs
      - CLICKHOUSE_USER=default
      - CLICKHOUSE_PASSWORD=local-dev-only
      - CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT=1
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    ports:
      - "8123:8123"
      - "9000:9000"
    networks:
      - unified_disc_network

volumes:
  postgres_data:
    driver: local

networks:
  unified_disc_network:
    driver: bridge